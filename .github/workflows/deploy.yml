name: Deploy Makwell Website

on:
  push:
    branches:
      - main

concurrency:
  group: makwell-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DEPLOY_PATH: /var/www/html/TV_Screens/Makwell-website

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Verify Repository
      - name: Verify Files
        run: |
          echo "Current Directory:"
          pwd

          echo "Repository Files:"
          ls -la

          echo "Index Preview:"
          head -10 index.html

      # Prepare Deployment Folder
      - name: Prepare Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo mkdir -p ${{ env.DEPLOY_PATH }}
          sudo rm -rf ${{ env.DEPLOY_PATH }}/*
          sudo chown -R ubuntu:ubuntu ${{ env.DEPLOY_PATH }}

      # Upload Website
      - name: Upload Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          overwrite: true
          rm: false
          source: |
            *.html
            css/**
            js/**
            images/**
            fonts/**
            scss/**
            *.png
            *.jpg
            *.jpeg
            *.gif
            *.svg
            *.ico
            *.pdf
            *.mp4
            *.css
            *.js
            CNAME
            README.txt
          target: ${{ env.DEPLOY_PATH }}

      # Fix Permissions
      - name: Fix Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo find ${{ env.DEPLOY_PATH }} -type d -exec chmod 755 {} \;
            sudo find ${{ env.DEPLOY_PATH }} -type f -exec chmod 644 {} \;

      # Verify Deployment
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ls -lah ${{ env.DEPLOY_PATH }}
            head -10 ${{ env.DEPLOY_PATH }}/index.html

      # Test Nginx
      - name: Test Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo nginx -t

      # Reload Nginx
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx

      # Deployment Complete
      - name: Success
        run: |
          echo "Deployment Completed Successfully 🚀"
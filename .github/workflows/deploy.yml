name: Deploy Makwell Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DEPLOY_PATH: /var/www/html/TV_Screens/Makwell-website

    steps:
      # 1. Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Prepare deployment folder
      - name: Prepare Deployment Folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo rm -rf ${{ env.DEPLOY_PATH }}/*
            sudo chown -R ubuntu:ubuntu ${{ env.DEPLOY_PATH }}

      # 3. Upload website
      - name: Upload Website
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      # 4. Remove unwanted Git files
      - name: Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf ${{ env.DEPLOY_PATH }}/.git
            sudo rm -rf ${{ env.DEPLOY_PATH }}/.github
            sudo rm -rf ${{ env.DEPLOY_PATH }}/.vscode
            sudo rm -f ${{ env.DEPLOY_PATH }}/.DS_Store

      # 5. Set permissions
      - name: Set Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo find ${{ env.DEPLOY_PATH }} -type d -exec chmod 755 {} \;
            sudo find ${{ env.DEPLOY_PATH }} -type f -exec chmod 644 {} \;

      # 6. Test Nginx
      - name: Test Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo nginx -t

      # 7. Reload Nginx
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx

      # 8. Deployment Complete
      - name: Success
        run: echo "🚀 Makwell Website deployed successfully!"